spectaql:
  displayAllServers: true
  targetDir: ./dist # Where SpectaQL writes the built site.

info:
  title: beatrice
  description: |
    GraphQL API for LLM-powered smart-novel features.
    The service is model-provider-agnostic — configure it against any OpenAI-compatible endpoint via env vars.

    See the [repo](https://github.com/kasir-barati/smart-novel-beatrice) for setup and self-hosting instructions.
  contact:
    name: kasir-barati
    url: https://github.com/kasir-barati/smart-novel-beatrice
  # SpectaQL requires at least one of introspection.url/servers.url/info.x-url. We ship purely-static docs (no live endpoint to point at), so we use x-url as a placeholder pointing at the repo — users self-host and hit /graphql on their own instance.
  x-url: https://github.com/kasir-barati/smart-novel-beatrice
  x-introItems:
    - title: Endpoint
      description: |
        All operations are served at `POST /graphql` on the deployed instance.

introspection:
  schemaFile: ./docs/schema.graphql
  removeTrailingPeriodFromDescriptions: false # Hide fields you never want in public docs (add per-field @spectaqlDirective in the SDL to override).
  spectaqlDirective:
    enable: true # SpectaQL reads metadata (examples, undocumented flags, …) from the `@spectaql` directive our SDL emits.

servers: []
