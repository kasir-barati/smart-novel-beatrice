name: Release Docker image

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  unit_tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python deps
        run: uv sync

      - name: Run unit tests
        run: make test

  evals:
    name: Run evals
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python deps
        run: uv sync

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # `local-setup/ollama/Dockerfile` bakes the model in at build time, so caching the built image = caching the model weights (~2 GB for qwen2.5:3b). We build once, load into the local daemon, and tag it with the exact name `docker compose up ollama` expects (<project>-<service>) so compose reuses it instead of rebuilding.
      - name: Build Ollama image (cached)
        uses: docker/build-push-action@v6
        with:
          context: local-setup/ollama
          load: true
          tags: smart-novel-beatrice-ollama:latest
          cache-from: type=gha,scope=ollama-evals
          cache-to: type=gha,scope=ollama-evals,mode=max
          # Keep in sync with .env.example / compose.yml default. Bumping this invalidates the cache on purpose (different model = different image).
          build-args: |
            OLLAMA_MODEL=qwen2.5:3b

      - name: Run evals
        id: run_evals
        env:
          # Force compose's generated image name to match the tag we just loaded above, so `docker compose up ollama` skips rebuilding.
          COMPOSE_PROJECT_NAME: smart-novel-beatrice
        run: make evals

      # Dump each module's report.json so we can compare CI booleans against the report.json committed from a local run. Runs only on failure to keep green pipelines quiet.
      - name: Dump eval reports on failure
        if: failure() && steps.run_evals.conclusion == 'failure'
        run: |
          shopt -s nullglob
          for f in src/modules/*/evals/report.json; do
            echo "== $f =="
            cat "$f"
            echo
          done

  integration_tests:
    name: Run integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python deps
        run: uv sync

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pre-build the Ollama image with GHA layer caching so tests/conftest.py finds `smart-novel-beatrice-ollama:latest` already loaded and skips building it (~2 GB model bake). The tag matches the constant `OLLAMA_IMAGE` in tests/conftest.py.
      - name: Build Ollama image (cached)
        uses: docker/build-push-action@v6
        with:
          context: local-setup/ollama
          load: true
          tags: smart-novel-beatrice-ollama:latest
          cache-from: type=gha,scope=ollama-evals
          cache-to: type=gha,scope=ollama-evals,mode=max
          build-args: |
            OLLAMA_MODEL=qwen2.5:3b

      - name: Run integration tests
        run: make integration_test

  release:
    name: Release + publish Docker image
    needs: [unit_tests, evals, integration_tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # TODO: replace with the smart-novel-beatrice Docker Hub account
          username: 9109679196
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Release and publish Docker image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TODO: replace with the smart-novel-beatrice Docker Hub repo
          DOCKERHUB_REPOSITORY: 9109679196/smart-novel-beatrice
        run: |
          npx \
            --package semantic-release@24.2.9 \
            --package @semantic-release/commit-analyzer@13.0.1 \
            --package @semantic-release/release-notes-generator@14.1.0 \
            --package @semantic-release/git \
            --package @semantic-release/exec@7.1.0 \
            --package @semantic-release/github@11.0.6 \
            --package conventional-changelog-conventionalcommits@9.1.0 \
            semantic-release
